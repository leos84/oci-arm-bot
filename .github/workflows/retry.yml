name: OCI ARM Retry

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  retry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install dependencies
        run: composer install --no-dev

      - name: Create .env
        run: |
          cat > .env << ENVEOF
          OCI_REGION=${{ secrets.OCI_REGION }}
          OCI_USER_ID=${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT=${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME=./oci_key.pem
          OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}
          OCI_OCPUS=2
          OCI_MEMORY_IN_GBS=8
          OCI_SHAPE=VM.Standard.A1.Flex
          OCI_MAX_INSTANCES=1
          OCI_SSH_PUBLIC_KEY="${{ secrets.OCI_SSH_PUBLIC_KEY }}"
          OCI_AVAILABILITY_DOMAIN=
          CACHE_AVAILABILITY_DOMAINS=1
          OCI_BOOT_VOLUME_SIZE_IN_GBS=
          TOO_MANY_REQUESTS_TIME_LIMIT=600
          ENVEOF

      - name: Create key file
        run: echo "${{ secrets.OCI_PRIVATE_KEY }}" > oci_key.pem

      - name: Run script
        id: run_script
        run: |
          OUTPUT=$(php index.php)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "Out of host capacity"; then
            echo "success=false" >> $GITHUB_OUTPUT
          else
            echo "success=true" >> $GITHUB_OUTPUT
            echo "output=$OUTPUT" >> $GITHUB_OUTPUT
          fi

      - name: Notify success
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Oracle instancia creada!"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: "Tu instancia Oracle ARM fue creada exitosamente.\n\n${{ steps.run_script.outputs.output }}"
